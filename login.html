<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Login - Game Demo</title>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
<style>*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}body{min-height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#2b1055,#0f2027,#f39c12);padding:20px}.card{width:100%;max-width:420px;background:rgba(255,255,255,.12);backdrop-filter:blur(12px);border-radius:24px;padding:30px;box-shadow:0 15px 40px rgba(0,0,0,.45);color:#fff;text-align:center}.logo{font-size:64px}h1{margin:10px 0 5px}p{color:#eee;margin-bottom:20px}input{width:100%;padding:15px;margin:10px 0;border:none;border-radius:12px;font-size:16px}button{width:100%;padding:15px;margin-top:12px;border:none;border-radius:12px;font-size:17px;font-weight:bold;cursor:pointer}.login{background:#ff9800;color:#fff}.register{background:#22c55e;color:#fff}#status{margin-top:15px;min-height:22px}</style></head><body><div class="card"><div class="logo">🎰</div><h1>GAME DEMO</h1><p>Masuk untuk melanjutkan permainan</p><input type="email" id="email" placeholder="Email"><input type="password" id="password" placeholder="Password"><button class="login" onclick="login()">LOGIN</button><button class="register" onclick="location.href='register.html'">DAFTAR AKUN</button><div id="status"></div></div><script>
const firebaseConfig={apiKey:"AIzaSyBeTALsF43ij3aAlZjF1XeBjB1gNtaTb2I",authDomain:"game-demo-4db7f.firebaseapp.com",projectId:"game-demo-4db7f",storageBucket:"game-demo-4db7f.firebasestorage.app",messagingSenderId:"405381506143",appId:"1:405381506143:web:da63f34a24f01e4f0367ea"};
firebase.initializeApp(firebaseConfig);const auth=firebase.auth();
auth.onAuthStateChanged(u=>{if(u)location.href='portal.html';});
function login(){const e=email.value.trim(),p=password.value.trim(),s=document.getElementById('status');if(!e||!p){s.textContent='Isi email dan password.';return;}s.textContent='Sedang login...';auth.signInWithEmailAndPassword(e,p).then(()=>location.href='portal.html').catch(err=>s.textContent=err.message);}
</script></body></html>
