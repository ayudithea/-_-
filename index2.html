<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>Portal Game Desktop</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e3a8a);
  color:#fff;
  min-width:1200px;
}
.container{
  width:1200px;
  margin:0 auto;
}
header{
  padding:50px 0 30px;
  text-align:center;
}
header h1{font-size:54px;margin-bottom:10px}
header p{font-size:20px;color:#dbeafe}
.grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:20px;
  padding:20px 0 50px;
}
.card{
  background:rgba(255,255,255,.12);
  border-radius:18px;
  padding:25px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,.35);
}
.icon{font-size:56px;margin-bottom:10px}
.card h3{margin:10px 0 18px}
.card a{
  display:block;
  background:#22c55e;
  color:#fff;
  text-decoration:none;
  padding:12px;
  border-radius:10px;
  font-weight:bold;
}
.card a:hover{background:#16a34a}
footer{
  text-align:center;
  padding:25px 0 40px;
  color:#cbd5e1;
}
</style>
</head>
<body>
<div class="container">
<header>
<h1>🎮 PORTAL GAME</h1>
<p>Pilih game yang ingin dimainkan.</p>
</header>

<div class="grid">
<div class="card"><div class="icon">🍓</div><h3>Fruit Match</h3><a href="buah.html">Mainkan</a></div>
<div class="card"><div class="icon">🔢</div><h3>2048</h3><a href="2048.html">Mainkan</a></div>
<div class="card"><div class="icon">🐍</div><h3>Snake</h3><a href="snake.html">Mainkan</a></div>
<div class="card"><div class="icon">🧱</div><h3>Block Puzzle</h3><a href="block.html">Mainkan</a></div>
<div class="card"><div class="icon">🧠</div><h3>Memory</h3><a href="memory.html">Mainkan</a></div>
<div class="card"><div class="icon">🧩</div><h3>Puzzle</h3><a href="puzzle.html">Mainkan</a></div>
<div class="card"><div class="icon">🏃</div><h3>Runner</h3><a href="runner.html">Mainkan</a></div>
<div class="card"><div class="icon">🎯</div><h3>Target</h3><a href="target.html">Mainkan</a></div>
<div class="card"><div class="icon">❌</div><h3>Tic Tac Toe</h3><a href="tic-tac-toe.html">Mainkan</a></div>
<div class="card"><div class="icon">🎲</div><h3>Lucky Dice</h3><a href="dice.html">Mainkan</a></div>
</div>

<footer>© 2026 Portal Game</footer>
</div>
</body>
</html>
