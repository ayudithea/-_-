<!DOCTYPE html>

<html lang="id">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  <title>Admin Dashboard - Legends Portal</title>  <style>  
  
*{  
margin:0;  
padding:0;  
box-sizing:border-box;  
font-family:Arial,sans-serif;  
}  
  
body{  
background:#0b1220;  
color:#fff;  
}  
  
header{  
height:70px;  
background:#182235;  
display:flex;  
align-items:center;  
justify-content:space-between;  
padding:0 20px;  
border-bottom:2px solid #ffd54a;  
position:sticky;  
top:0;  
z-index:100;  
}  
  
header h2{  
color:#ffd54a;  
font-size:22px;  
}  
  
header button{  
padding:10px 18px;  
border:none;  
border-radius:8px;  
background:#ff4444;  
color:#fff;  
font-weight:bold;  
cursor:pointer;  
}  
  
.container{  
display:flex;  
min-height:calc(100vh - 70px);  
}  
  
.sidebar{
position:fixed;
top:70px;
left:-260px;
width:240px;
height:calc(100vh - 70px);
background:#182235;
padding:15px;
overflow-y:auto;
transition:.3s;
z-index:999;
}
.sidebar.show{
left:0;
}
  #overlay{
position:fixed;
top:70px;
left:0;
width:100%;
height:calc(100vh - 70px);
background:rgba(0,0,0,.45);
display:none;
z-index:998;
}

#overlay.show{
display:block;
}
.sidebar button{  
width:100%;  
padding:14px;  
margin-bottom:10px;  
border:none;  
border-radius:10px;  
background:#22314f;  
color:#fff;  
font-size:15px;  
cursor:pointer;  
text-align:left;  
}  
  
.sidebar button:hover{  
background:#2563eb;  
}  
  
.sidebar button.active{  
background:#ffd54a;  
color:#000;  
font-weight:bold;  
}

width:100%;
