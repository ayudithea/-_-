<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LEGENDS PORTAL - Login</title>

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
}
 


</style>
</head>
<body>
<div class="container">

    <img src="zeus.png" class="bg">

    <div class="panel">

        <!-- Email -->
        <div class="field email">
            <div class="icon">📧</div>
            <input id="email" type="email" placeholder="Email">
        </div>

        <!-- Password -->
        <div class="field pass">
            <div class="icon">🔒</div>
            <input id="password" type="password" placeholder="Password">
            <div class="eye">👁️</div>
        </div>

        <button class="login">LOGIN</button>

        <button class="register">DAFTAR AKUN</button>

    </div>

</div>
<script>
const firebaseConfig={
apiKey:"AIzaSyBeTALsF43ij3aAlZjF1XeBjB1gNtaTb2I",
authDomain:"game-demo-4db7f.firebaseapp.com",
projectId:"game-demo-4db7f",
storageBucket:"game-demo-4db7f.firebasestorage.app",
messagingSenderId:"405381506143",
appId:"1:405381506143:web:da63f34a24f01e4f0367ea"
};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
auth.onAuthStateChanged(u=>{if(u)location.href='portal.html';});
function login(){
const e=email.value.trim(),p=password.value.trim();
msg.textContent="Memverifikasi...";
auth.signInWithEmailAndPassword(e,p)
.then(()=>location.href='portal.html')
.catch(err=>msg.textContent=err.message);
}
</script>

<audio id="bgMusic" preload="auto">
    <source src="thunder.mp3" type="audio/mpeg">
</audio>

<script>
window.addEventListener("load", () => {
    const audio = document.getElementById("bgMusic");
    audio.volume = 1; // 0.0 - 1.0
    audio.play().catch(() => {
        // Jika browser memblokir autoplay,
        // putar saat pengguna menyentuh layar pertama kali.
        document.addEventListener("click", () => {
            audio.play();
        }, { once: true });

        document.addEventListener("touchstart", () => {
            audio.play();
        }, { once: true });
    });
});
</script>
</body>
</html>
